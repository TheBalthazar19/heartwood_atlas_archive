$("#craftTable").tablesorter({

      var value = $(this).val().toLowerCase();
      $("#craftTable tbody tr").filter(function() {
        $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
      });
      });

	console.log( "ready! - #craftTable-carpentry-item" );
