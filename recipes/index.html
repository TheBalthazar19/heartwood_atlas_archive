<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Heartwood Atlas</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:40px}
table{border-collapse:collapse;width:100%;background:white;color:black}
td,th{border:1px solid #ccc;padding:6px}

<body>
<!DOCTYPE html>

<html>

<head>
<title>Recipes - Heartwood Atlas</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

a{
color:#60a5fa;
text-decoration:none;
display:block;
margin:10px 0;
font-size:18px;
}

a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<h1>Weapons</h1>

<div id="list"></div>

<script>

fetch("./")
.then(r=>r.text())
.then(t=>{

let parser=new DOMParser()
let html=parser.parseFromString(t,"text/html")

let links=[...html.querySelectorAll("a")]

let container=document.getElementById("list")

links.forEach(link=>{

let href=link.getAttribute("href")

if(href && href.endsWith(".html")){

let a=document.createElement("a")
a.href=href
a.textContent=href.replace(".html","").replaceAll("_"," ")

container.appendChild(a)

}

})

})

</script>

</body>

</html>
</body></html>
